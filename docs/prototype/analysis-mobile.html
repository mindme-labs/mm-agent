<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mmlabs — Анализ (Mobile)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F8F7F4;--white:#FFF;--ink:#141414;--ink2:#3D3D3D;--muted:#888680;--border:#E0DDD6;--green:#0F7B5C;--green-bg:#ECF6F2}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto}

.top{padding:14px 20px}.logo{font-size:16px;font-weight:700}.logo span{color:var(--green)}

.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:0 24px 60px}
.card{width:100%;text-align:center}

.pulse{width:64px;height:64px;border-radius:50%;background:var(--green-bg);border:2px solid rgba(15,123,92,.18);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;animation:p 2s ease-in-out infinite}
@keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.06);opacity:.85}}
h1{font-size:20px;font-weight:800;margin-bottom:6px}
.sub{font-size:14px;color:var(--muted);margin-bottom:28px}
.cancel{font-size:13px;color:var(--muted);margin-bottom:28px;display:block;text-decoration:underline;cursor:pointer}

.bar{width:100%;height:4px;background:var(--border);border-radius:2px;margin-bottom:24px;overflow:hidden}
.bar-fill{height:100%;background:var(--green);border-radius:2px;transition:width .5s;width:0%}

.stages{display:flex;flex-direction:column;gap:5px;text-align:left}
.st{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;transition:all .3s}
.st.done{background:var(--green-bg)}
.st.on{background:var(--white);border:1px solid var(--border)}
.st.wait{opacity:.3}
.st-ico{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.st.done .st-ico{background:var(--green)}
.st.on .st-ico{background:var(--green-bg);animation:spin 1.2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.st-txt{font-size:13px;font-weight:600;flex:1}
.st.done .st-txt{color:var(--green)}
.st.on .st-txt{color:var(--ink)}
.st.wait .st-txt{color:var(--muted)}

/* COMPLETE */
.done-wrap{display:none;text-align:center}
.done-wrap.vis{display:block}
.done-ico{width:56px;height:56px;border-radius:50%;background:var(--green);margin:0 auto 16px;display:flex;align-items:center;justify-content:center}
.done-wrap h2{font-size:20px;font-weight:800;margin-bottom:6px}
.done-wrap p{font-size:14px;color:var(--ink2);margin-bottom:20px;line-height:1.5}
.stats{display:flex;gap:16px;justify-content:center;margin-bottom:20px}
.stat{text-align:center}
.stat-n{font-size:20px;font-weight:800;color:var(--green)}
.stat-l{font-size:10px;color:var(--muted)}
.go-btn{width:100%;padding:15px;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;border:none;background:var(--green);color:#fff}
</style>
</head>
<body>
<div class="top"><div class="logo">mm<span>labs</span></div></div>
<div class="wrap">
  <div class="card">
    <div id="proc">
      <div class="pulse"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="var(--green)" stroke-width="2" stroke-linecap="round"/></svg></div>
      <h1>Анализируем данные</h1>
      <p class="sub">Около минуты. Не закрывайте страницу.</p>
      <a class="cancel">Отменить</a>
      <div class="bar"><div class="bar-fill" id="bf"></div></div>
      <div class="stages" id="stg">
        <div class="st on" data-i="0"><div class="st-ico"><svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3.5" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-dasharray="3 2"/></svg></div><span class="st-txt">Распознавание файлов</span></div>
        <div class="st wait" data-i="1"><div class="st-ico"><svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3.5" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="3 2"/></svg></div><span class="st-txt">Извлечение данных</span></div>
        <div class="st wait" data-i="2"><div class="st-ico"><svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3.5" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="3 2"/></svg></div><span class="st-txt">Расчёт метрик</span></div>
        <div class="st wait" data-i="3"><div class="st-ico"><svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3.5" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="3 2"/></svg></div><span class="st-txt">Проверка правил</span></div>
        <div class="st wait" data-i="4"><div class="st-ico"><svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3.5" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="3 2"/></svg></div><span class="st-txt">Формирование рекомендаций</span></div>
      </div>
    </div>
    <div class="done-wrap" id="done">
      <div class="done-ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M7 13l3 3 7-7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <h2>Анализ завершён</h2>
      <p>Найдены возможности, требующие вашего внимания.</p>
      <div class="stats">
        <div class="stat"><div class="stat-n">7</div><div class="stat-l">рекомендаций</div></div>
        <div class="stat"><div class="stat-n">₽18.3M</div><div class="stat-l">найдено</div></div>
        <div class="stat"><div class="stat-n">3</div><div class="stat-l">критичных</div></div>
      </div>
      <button class="go-btn">К рекомендациям →</button>
    </div>
  </div>
</div>
<script>
const ss=document.querySelectorAll('.st'),bf=document.getElementById('bf'),chk='<svg width="10" height="10" viewBox="0 0 10 10"><path d="M2.5 5l2 2L7.5 3.5" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>';
let c=0;
function step(){
  if(c>0){ss[c-1].className='st done';ss[c-1].querySelector('.st-ico').innerHTML=chk;ss[c-1].querySelector('.st-ico').style.background='var(--green)';}
  if(c<ss.length){ss[c].className='st on';bf.style.width=((c+1)/ss.length*100)+'%';c++;setTimeout(step,1600);}
  else{bf.style.width='100%';setTimeout(()=>{document.getElementById('proc').style.display='none';document.getElementById('done').classList.add('vis');},500);}
}
setTimeout(step,400);
</script>
</body>
</html>
